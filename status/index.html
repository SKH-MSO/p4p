<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="p4p-session" content="__P4P_ACCESS_TOKEN__">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAKHONMSO P4P</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Work+Sans:wght@400;500;600&family=Noto+Sans+Thai+Looped:wght@100..900&display=swap"
        rel="stylesheet">
    <style>
        .stat-ico { width: 15px; height: 15px; vertical-align: -2px; }
        :root {
            --primary: #A68966;
            --secondary: #4B3D33;
            --tertiary: #F5F5F0;
            --neutral: #FAF9F6;
            --text: #2d2d2d;
            --text-muted: #6b6b6b;
            --muted: #9A8A7A;
            --border: #d9d2c8;
            --danger: #c0392b;
            --radius: 4px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Work Sans", "Noto Sans Thai Looped", sans-serif;
            background: var(--neutral);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Desktop block ───────────────────────────────────── */
        #desktop-block {
            display: none;
            position: fixed; inset: 0;
            background: var(--neutral);
            flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center; padding: 32px; z-index: 999;
        }
        #desktop-block h2 {
            font-family: 'Manrope', 'Noto Sans Thai Looped', sans-serif;
            font-size: 1.35rem; font-weight: 700; color: var(--secondary); margin-bottom: 8px;
        }
        #desktop-block p { color: var(--muted); font-size: .95rem; }

        /* Header */
        #header {
            display: none;
            position: sticky;
            top: 0;
            z-index: 10;
            background: var(--tertiary);
            box-shadow: 0 2px 8px rgba(75, 61, 51, 0.1);
            flex-direction: column;
            margin-bottom: 20px;
        }

        #header-top {
            display: flex;
            align-items: stretch;
        }

        #header_display {
            flex: 1;
            padding: 10px 12px 10px 20px;
            font-family: "Manrope", "Noto Sans Thai Looped", sans-serif;
            font-size: 1.05rem;
            font-weight: 600;
            background: var(--primary);
            color: #fff;
        }

        #header_count {
            padding: 10px 16px 10px 12px;
            text-align: right;
            font-size: 0.85rem;
            color: var(--text-muted);
            white-space: nowrap;
            align-self: center;
        }

        /* Skeleton */
        .skeleton {
            background: linear-gradient(90deg, var(--border) 25%, var(--tertiary) 50%, var(--border) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            color: transparent !important;
            border-radius: var(--radius);
            min-height: 1em;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Search area */
        #search-area {
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: var(--neutral);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            padding: 8px 12px;
            width: 100%;
            gap: 8px;
        }
        .search-box svg {
            width: 16px;
            height: 16px;
            opacity: 0.45;
            flex-shrink: 0;
        }
        #header_search {
            border: none;
            outline: none;
            background: transparent;
            font-family: "Work Sans", "Noto Sans Thai Looped", sans-serif;
            font-size: 0.95rem;
            width: 100%;
            color: var(--text);
        }
        #header_search::placeholder { color: var(--border); }
        #header_search:disabled { opacity: 0.5; }

        #header_note {
            font-size: 0.75rem;
            color: var(--border);
            text-align: center;
        }
        #header_note.active { color: var(--text-muted); }

        .radio-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            width: 100%;
        }
        .radio-option {
            display: flex;
            align-items: center;
            gap: 6px;
            justify-content: center;
        }
        .radio-option label {
            font-size: 0.9rem;
            color: var(--border);
            cursor: pointer;
        }
        .radio-option label.active { color: var(--text); }
        input[type="radio"] { accent-color: var(--primary); cursor: pointer; }

        /* Content */
        #content {
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 0 16px 48px;
            gap: 16px;
        }

        /* Hide cards during load */
        #pending, #sent { display: none; }

        /* Spinner */
        #load {
            width: 36px;
            height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 32px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Collapse sections */
        #pending { background: #4B3D33; border-color: #4B3D33; }
        details.collapse-section {
            width: 100%;
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            background: var(--tertiary);
            overflow: hidden;
        }
        details.collapse-section summary {
            list-style: none;
            padding: 14px 16px;
            font-family: "Manrope", "Noto Sans Thai Looped", sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: var(--secondary);
            user-select: none;
        }
        details.collapse-section summary::-webkit-details-marker { display: none; }
        details.collapse-section summary::after {
            content: "▼";
            font-size: 0.65rem;
            transition: transform 0.2s;
            color: var(--primary);
        }
        details.collapse-section[open] summary::after { transform: rotate(180deg); }
        .collapse-content { padding: 8px; }

        /* Tables */
        .table-box {
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            background: var(--neutral);
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; }
        td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--tertiary);
            vertical-align: middle;
        }
        tr:last-child td { border-bottom: none; }

        .td-name { width: 100%; }
        .name-main { font-size: 1.15rem; }
        .name-sub { font-size: 0.9rem; color: var(--text-muted); margin-top: 2px; }
        .td-name.not-sent .name-main { color: var(--danger); }
        .td-status { text-align: right; white-space: nowrap; }

        /* Searchable */
        #searchable {
            display: none;
            width: 100%;
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            background: var(--neutral);
            overflow-x: auto;
        }
        .dep-header td {
            background: var(--secondary);
            color: #fff;
            text-align: center;
            font-family: "Manrope", "Noto Sans Thai Looped", sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
        }
        .search-name { font-size: 1.15rem; }
        .search-name.not-sent { color: var(--danger); }
        .search-status { text-align: right; }
        .icon-notset { color: var(--danger); }

        /* Pending dropdown: dark-brown body when open, matching its summary */
        #pending .table-box {
            background: #4B3D33;
            border-color: rgba(255, 255, 255, 0.14);
        }
        #pending td { border-bottom-color: rgba(255, 255, 255, 0.14); }
        #pending .name-main { color: #ffffff; }
        #pending .name-sub { color: #d8cfc4; }
        #pending .icon-notset { color: #ff9486; }

        /* Back to top */
        #backtotop {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--primary);
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 10px rgba(75, 61, 51, 0.3);
            z-index: 10;
        }
        #backtotop svg { width: 22px; height: 22px; fill: #fff; }
        #backtotop.hidden { display: none; }
    </style>
</head>

<body>
    <div id="desktop-block">
        <h2>ไม่รองรับการใช้งานบนคอมพิวเตอร์</h2>
        <p>กรุณาเปิดลิงก์นี้ผ่านโทรศัพท์มือถือ</p>
    </div>

    <div id="header">
        <div id="header-top">
            <div id="header_display" class="skeleton">เดือน..</div>
            <div id="header_count" class="skeleton">รวบรวมข้อมูล..</div>
        </div>
        <div id="search-area">
            <div class="search-box">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                        stroke="currentColor">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.3-4.3"></path>
                    </g>
                </svg>
                <input id="header_search" type="search" placeholder="พิมพ์เพื่อค้นหา.." autocomplete="off" disabled />
            </div>
            <div id="header_note">พิมพ์เว้นวรรคเพื่อดูรายชื่อทั้งหมดเรียงตามกลุ่มงาน</div>
            <div class="radio-group">
                <div class="radio-option">
                    <input id="byname_input" type="radio" name="sort_mode" disabled />
                    <label id="byname_label" for="byname_input">ชื่อแพทย์</label>
                </div>
                <div class="radio-option">
                    <input id="bydep_input" type="radio" name="sort_mode" disabled />
                    <label id="bydep_label" for="bydep_input">ชื่อกลุ่มงาน</label>
                </div>
            </div>
        </div>
    </div>

    <div id="content">
        <div id="load"></div>
        <details id="pending" class="collapse-section">
            <summary>รายชื่อผู้ที่ยังไม่ได้ส่ง</summary>
            <div class="collapse-content">
                <div class="table-box">
                    <table><tbody id="tbody_pending"></tbody></table>
                </div>
            </div>
        </details>
        <details id="sent" class="collapse-section">
            <summary>รายชื่อผู้ที่ส่งแล้ว</summary>
            <div class="collapse-content">
                <div class="table-box">
                    <table><tbody id="tbody_sent"></tbody></table>
                </div>
            </div>
        </details>
        <div id="searchable">
            <table><tbody id="tbody_searchable"></tbody></table>
        </div>
    </div>

    <button type="button" id="backtotop" class="hidden">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path d="M12 4l-8 8h5v8h6v-8h5z" />
        </svg>
    </button>

    <!-- Supabase JS client -->
    <script src="/assets/diag.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.50.0/dist/umd/supabase.js" integrity="sha384-K0oxqktRvaThvYgGL4G+OK2Ih6VS6Uyu7j3+7WJgp/uWM0Yv6Xi4YEiw0BB+mPfi" crossorigin="anonymous"></script>
    <script src="/assets/shared.js"></script>
    <script src="/assets/auth-guard.js"></script>
    <script src="app.js"></script>
</body>

</html>
