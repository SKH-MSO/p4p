name: Debug - Fetch Live Rich Menu Image

# One-off manual diagnostic: downloads whatever image LINE currently serves
# for the "month-picker" alias and uploads it as a build artifact, so it can
# be inspected outside of the LINE app (e.g. to compare against a local
# re-render when text looks garbled on-device).
on:
  workflow_dispatch:
    inputs:
      alias:
        description: "Rich menu alias to fetch"
        required: true
        default: "month-picker"

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Dump environment info
        run: |
          echo "--- node ---"
          node -p "process.versions"
          echo "--- os ---"
          uname -a
          cat /etc/os-release
          echo "--- glibc ---"
          ldd --version | head -1
          echo "--- resvg-js resolved packages ---"
          find node_modules/@resvg -maxdepth 2 -name 'package.json' -exec sh -c 'echo {}; grep -E "\"name\"|\"version\"" {}' \;
          echo "--- resvg native binding actually loaded at runtime ---"
          node -e "const p=require('@resvg/resvg-js'); console.log(Object.keys(p))"
          echo "--- fontconfig / system fonts (should be irrelevant since loadSystemFonts:false, but checking anyway) ---"
          fc-list 2>&1 | grep -i thai || echo "no system Thai fonts found (or fc-list unavailable)"
          echo "--- font file hashes ---"
          sha256sum src/fonts/*.ttf

      - name: Download live rich menu image
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
        run: node scripts/debug-fetch-richmenu.mjs "${{ inputs.alias }}"

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: richmenu-live
          path: richmenu-live.png
          retention-days: 3
