name: "! create SK03 and merge files"

on:
  schedule:
    # Runs every day at 00:00 UTC (07:00 Bangkok time, UTC+7)
    - cron: '0 0 * * *'
  workflow_dispatch: # allow manual trigger from GitHub UI

permissions:
  contents: read

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: process/package-lock.json

      - name: Install dependencies
        working-directory: process
        run: npm ci

      - name: Install Python dependencies
        run: pip install openpyxl

      - name: Preprocess Drive folders (trash older duplicates & unrelated files)
        working-directory: process
        env:
          GOOGLE_CLIENT_ID:       ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:   ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN:   ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_ROOT_FOLDER_ID:  ${{ secrets.GOOGLE_ROOT_FOLDER_ID }}
          SUPABASE_URL:           ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:           ${{ secrets.SUPABASE_KEY }}
        run: node preprocess-drive.js

      - name: Run process pipeline
        working-directory: process
        env:
          GOOGLE_CLIENT_ID:       ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:   ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN:   ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_ROOT_FOLDER_ID:  ${{ secrets.GOOGLE_ROOT_FOLDER_ID }}
          GOOGLE_MERGE_FOLDER_ID: ${{ secrets.GOOGLE_MERGE_FOLDER_ID }}
          GOOGLE_SK03_FOLDER_ID:  ${{ secrets.GOOGLE_SK03_FOLDER_ID }}
          GOOGLE_SK03_TEMPLATE_ID: ${{ secrets.GOOGLE_SK03_TEMPLATE_ID }}
          SUPABASE_URL:           ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:           ${{ secrets.SUPABASE_KEY }}
        run: node process.js

      - name: Upload run log as artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: run-log-${{ github.run_number }}
          path: process/*.log
          if-no-files-found: ignore
          retention-days: 30
