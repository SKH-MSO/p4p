name: TEMP - Check Month (Drive vs Supabase)

# Temporary diagnostic workflow — safe to delete after use.
# Manually runs automation/scripts/check-month.mjs to compare a Google Drive
# month folder against the matching Supabase table.

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: "Date key, e.g. 2569_04"
        required: true
        default: "2569_04"

jobs:
  check-month:
    name: Compare Drive folder vs Supabase table
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: automation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: automation/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run check-month
        env:
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:         ${{ secrets.SUPABASE_KEY }}
          P4P_FOLDER_ID:        ${{ secrets.P4P_FOLDER_ID }}
          TARGET_DATE:          ${{ inputs.target_date }}
        run: node scripts/check-month.mjs
