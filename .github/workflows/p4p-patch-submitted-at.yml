name: Patch submitted_at

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: "Month table (e.g. 2569_03)"
        required: true
        default: "2569_03"
      physician_names:
        description: "Comma-separated full names to patch"
        required: true
        default: "ณัฐพงศ์ รั้วมั่น,จารุวรรณ โชคนาคะวโร"
      dry_run:
        description: "true = print only, false = write to Supabase"
        required: true
        default: "false"

jobs:
  patch:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: automation

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: automation/package-lock.json

      - run: npm ci

      - name: Patch submitted_at
        env:
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:         ${{ secrets.SUPABASE_KEY }}
          TARGET_DATE:          ${{ inputs.target_date }}
          PHYSICIAN_NAMES:      ${{ inputs.physician_names }}
          DRY_RUN:              ${{ inputs.dry_run }}
        run: node scripts/patch-submitted-at.mjs
