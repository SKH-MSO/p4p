name: Send Dummy Telegram — All 3 Layouts

on:
  push:
    branches:
      - claude/tg-msg-layout-email-extract-76j713
    paths:
      - .github/workflows/send-dummy-telegram.yml
      - automation/telegram.js
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Layout 1 — Pending Approval (🟡)
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d '{
              "chat_id": "'"${CHAT_ID}"'",
              "text": "🟡 New Sender — Pending Approval\n────────────────────────────────────────\n\n📧 Email      : new.doctor@gmail.com\n👤 Display    : นพ.สมชาย ใจดี\n🔍 Extracted  : สมชาย ใจดี\n✅ Best match : สมชาย ใจดีรักษ์\n   Dept       : อายุรกรรม\n   Similarity : 87%\n📨 Emails     : 3",
              "reply_markup": {
                "inline_keyboard": [[
                  { "text": "✅ Approve",   "callback_data": "approve:new.doctor@gmail.com" },
                  { "text": "✏️ Fix name", "callback_data": "fixname:new.doctor@gmail.com" },
                  { "text": "❌ Reject",   "callback_data": "reject:new.doctor@gmail.com"  }
                ]]
              }
            }'

      - name: Layout 2 — P4P Workload Report (🟢)
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d '{
              "chat_id": "'"${CHAT_ID}"'",
              "text": "🟢 Email submission report\n────────────────────────────────────────\n\n👤 Name       : สมชาย ใจดีรักษ์\n🔗 Matched    : สมชาย ใจดีรักษ์ (87% match)\n📅 Date       : 2025_06\n🏅 Score      : 95\n💾 Saved      : ✅ Score saved to DB\n\n📎 File       : workload_june.xlsx"
            }'

      - name: Layout 3 — Processing Error (🔴)
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d '{
              "chat_id": "'"${CHAT_ID}"'",
              "text": "🔴 P4P Processing Error\n────────────────────────────────────────\n\n📎 File       : workload_june.xlsx\n💬 Error      : wrong file extension — expected .xlsx"
            }'
