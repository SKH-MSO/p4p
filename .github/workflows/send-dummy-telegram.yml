name: Send Dummy Telegram Layout 1

on:
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Send Layout 1 dummy message
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d '{
              "chat_id": "'"${CHAT_ID}"'",
              "text": "🔔 New Sender — Pending Approval\n\n📧 Email      : new.doctor@gmail.com\n👤 Display    : นพ.สมชาย ใจดี\n🔍 Extracted  : สมชาย ใจดี\n✅ Best match : สมชาย ใจดีรักษ์\n   Dept       : อายุรกรรม\n   Similarity : 87%\n📨 Emails     : 3",
              "reply_markup": {
                "inline_keyboard": [[
                  { "text": "✅ Approve",   "callback_data": "approve:new.doctor@gmail.com" },
                  { "text": "✏️ Fix name", "callback_data": "fixname:new.doctor@gmail.com" },
                  { "text": "❌ Reject",   "callback_data": "reject:new.doctor@gmail.com"  }
                ]]
              }
            }'
