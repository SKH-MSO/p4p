name: Match Sender Emails

on:
  # Manual only. Live submissions now update sender_physician_match directly
  # (automation/index.js, right after a score is saved) — this workflow is
  # just a backfill tool for historical mail that predates that change, or
  # for repairing/re-deriving matches after a manual fix.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  match:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: automation

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: automation/package-lock.json

      - run: npm ci

      # match-sender-emails.mjs writes results straight to the
      # sender_physician_match Supabase table (saveSenderMatch) — that table
      # is RLS-locked with zero anon/authenticated policies (see
      # automation/sql/sender_physician_match.sql), unlike a committed file.
      # A previous version of this workflow additionally wrote a CSV and
      # committed it to `main`, baking real physician emails/names into git
      # history outside of Supabase's access controls; that CSV was removed
      # from the repo (see "Remove sender-physician-match.csv now that it's
      # migrated to Supabase") but this workflow's commit step was left
      # behind — it no longer even wrote to the path it tried to `git add`
      # (OUTPUT_PATH was never wired into the script), so it was silently
      # broken as well as a latent PII-in-git risk. Removed along with the
      # `contents: write` permission it no longer needs.
      - name: Match sender emails
        env:
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:         ${{ secrets.SUPABASE_KEY }}
        run: node scripts/match-sender-emails.mjs
