name: Match Sender Emails

on:
  workflow_dispatch:

jobs:
  match:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: automation

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: automation/package-lock.json

      - run: npm ci

      - name: Generate match CSV
        env:
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:         ${{ secrets.SUPABASE_KEY }}
          OUTPUT_PATH:          ${{ github.workspace }}/sender-physician-match.csv
        run: node scripts/match-sender-emails.mjs

      - name: Commit CSV to main
        working-directory: ${{ github.workspace }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add sender-physician-match.csv
          git commit -m "chore: update sender-physician-match.csv" || echo "No changes to commit"
          git push origin HEAD:main
