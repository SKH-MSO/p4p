name: TEMP - List Month Raw (Drive diagnostic)

# Temporary diagnostic workflow — safe to delete after use.
# Lists every raw item in a Drive month folder (folders, trashed, all
# mime types) to find what listMonthFiles() normally filters out.

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: "Date key, e.g. 2569_04"
        required: true
        default: "2569_04"

jobs:
  list-raw:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: automation

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: automation/package-lock.json

      - run: npm ci

      - name: List raw month contents
        env:
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          P4P_FOLDER_ID:        ${{ secrets.P4P_FOLDER_ID }}
          TARGET_DATE:          ${{ inputs.target_date }}
        run: node scripts/list-month-raw.mjs
