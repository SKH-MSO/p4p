name: Populate Year Folders

on:
  schedule:
    # 07:00 Bangkok time on 1 January every year (00:00 UTC)
    - cron: '0 0 1 1 *'
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  populate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: process/package-lock.json

      - name: Install dependencies
        working-directory: process
        run: npm ci

      - name: Populate year and month folders
        working-directory: process
        env:
          GOOGLE_CLIENT_ID:      ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:  ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN:  ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_ROOT_FOLDER_ID: ${{ secrets.GOOGLE_ROOT_FOLDER_ID }}
        run: node populate.js
