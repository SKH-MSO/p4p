<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>P4P Admin — LINE Bindings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Work+Sans:wght@400;500;600&family=Noto+Sans+Thai+Looped:wght@100..900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #A68966;
            --secondary: #4B3D33;
            --tertiary: #F5F5F0;
            --neutral: #FAF9F6;
            --text: #2d2d2d;
            --text-muted: #6b6b6b;
            --muted: #9A8A7A;
            --border: #d9d2c8;
            --danger: #c0392b;
            --radius: 4px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Work Sans", "Noto Sans Thai Looped", sans-serif;
            background: var(--neutral);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        header {
            background: var(--secondary);
            color: #fff;
            padding: 20px 24px;
        }
        header h1 {
            font-family: "Manrope", "Noto Sans Thai Looped", sans-serif;
            font-size: 1.15rem;
            font-weight: 700;
        }
        header p {
            color: #d9cfc2;
            font-size: 0.85rem;
            margin-top: 4px;
        }

        main {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px 16px 60px;
        }

        #toolbar {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 16px;
        }
        #search {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 0.95rem;
            font-family: inherit;
            background: #fff;
        }
        #search:focus { outline: 2px solid var(--primary); outline-offset: -1px; }
        #refresh {
            padding: 10px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: #fff;
            color: var(--secondary);
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }
        #refresh:hover { background: var(--tertiary); }
        #refresh:disabled { opacity: 0.5; cursor: default; }

        #count {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }
        th, td {
            padding: 10px 12px;
            text-align: left;
            font-size: 0.85rem;
            border-bottom: 1px solid var(--border);
            word-break: break-word;
        }
        th {
            background: var(--tertiary);
            color: var(--secondary);
            font-weight: 700;
            position: sticky;
            top: 0;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: var(--tertiary); }
        td.mono { font-family: ui-monospace, "SF Mono", Consolas, monospace; font-size: 0.8rem; }
        td.muted { color: var(--text-muted); }

        #state {
            padding: 40px 16px;
            text-align: center;
            color: var(--text-muted);
        }
        #state.error { color: var(--danger); }
        .hidden { display: none; }

        @media (max-width: 600px) {
            table, thead, tbody, th, td, tr { display: block; }
            thead { display: none; }
            tr {
                background: #fff;
                border: 1px solid var(--border);
                border-radius: var(--radius);
                margin-bottom: 10px;
                padding: 10px 12px;
            }
            td {
                border: none;
                padding: 4px 0;
            }
            td::before {
                content: attr(data-label);
                display: block;
                font-size: 0.7rem;
                font-weight: 700;
                color: var(--muted);
                text-transform: uppercase;
                letter-spacing: 0.03em;
            }
        }
    </style>
</head>

<body>
    <header>
        <h1>P4P Admin — LINE ↔ Email Bindings</h1>
        <p>Which LINE account is bound to which verified physician email (line_user_bindings).</p>
    </header>
    <main>
        <div id="toolbar">
            <input type="text" id="search" placeholder="Search email, name, or LINE userId…" autocomplete="off">
            <button id="refresh">Refresh</button>
        </div>
        <div id="count"></div>
        <div id="state">Loading…</div>
        <table id="table" class="hidden">
            <thead>
                <tr>
                    <th>Email</th>
                    <th>LINE Display Name</th>
                    <th>LINE User ID</th>
                    <th>Bound At</th>
                </tr>
            </thead>
            <tbody id="rows"></tbody>
        </table>
    </main>
    <script src="app.js"></script>
</body>

</html>
